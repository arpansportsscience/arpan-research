        body {

            display: flex;
            flex-direction: column;
            min-height: 100vh;

        /* Light Orange Header */
        .hero-section {
            background-color: #fff3e0;

        }
        .hero-section h1 { color: #e65100; font-weight: 700; }

            color: #003366 !important;
            font-weight: 600;
        }
        .nav-link.active { border-bottom: 2px solid #003366; }

        /* Photo Gallery Grid */
        .img-wrapper {
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            border: 3px solid #fff3e0;
            transition: transform 0.3s ease, border-color 0.3s ease;
            background-color: #f8fbff;
        }
        .img-wrapper:hover {
            transform: translateY(-8px);
            border-color: #0056b3;
        }

        .gallery-img {
            width: 100%;
            height: 400px; /* Increased height for better visibility */
            object-fit: cover; /* Crops the image to fill the container */
            display: block;
        }

        /* FIX: Adjusts the vertical "frame" of the photo */
        .curaj-photo {
            object-position: center 15%; /* Moves the view UP to show your face/sign */
        }
        
        .rkm-photo {
            object-position: center 25%; /* Adjusts the framing for the Belur Math photo */
        }

        .img-caption {
            padding: 15px;
            font-size: 0.95rem;
            font-weight: 600;
            text-align: center;
            background: #ffffff;
            color: #003366;
            border-top: 1px solid #eee;
        }

        /* Footer */
        footer {
            background-color: #212121;
            color: #ffffff;
            padding: 40px 0;
            margin-top: auto;
            text-align: center;
        }
        .visitor-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }
        .visitor-badge { height: 22px !important; border: none !important; }
        .eye-icon { color: #0056b3; font-size: 1.1rem; }
